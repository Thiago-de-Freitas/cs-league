# Serviço Worker — cs-league-worker (Root Directory = Worker)
#
# Variáveis: Worker/railway.env
#   railway variable import --file railway.env --service cs-league-worker --yes
# Ou: ..\scripts\railway-import-vars.ps1 -Target worker

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Worker deve reiniciar sempre — ON_FAILURE para após 5 crashes (ex.: OOM no parse)
restartPolicyType = "ALWAYS"
