# Serviço API — gamers-league-back (Root Directory = /)
#
# Variáveis de ambiente NÃO vão no railway.toml (limitação da Railway).
# Use o arquivo companion railway.back.env na mesma pasta:
#   railway variable import --file railway.back.env --service gamers-league-back --yes
# Ou: .\scripts\railway-import-vars.ps1 -Target back
#
# Opção A (monolito): use railway.back.monolith.env no serviço único.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 120
preDeployCommand = "npx prisma migrate deploy"
startCommand = "node dist/index.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
