<div class="page-container">
  <div class="page-inner max-width-narrow">
    <div class="gc-card-header list-page-header">
      <div>
        <h1 class="page-title">Times</h1>
        <p class="page-subtitle list-page-subtitle">Seus times e elencos de Counter-Strike 2</p>
      </div>
      <button class="btn btn-primary" (click)="openCreateModal()">+ Novo Time</button>
    </div>

    <div *ngIf="successMessage" class="success-message mb-4">
      <span>{{ successMessage }}</span>
      <button class="btn btn-secondary btn-small mt-2" (click)="goToTeamDetails()" *ngIf="createdTeamId">
        Ver detalhes do time
      </button>
    </div>

    <div *ngIf="loading" class="loading">Carregando...</div>

    <div class="gc-card" *ngIf="!loading">
      <h2 class="section-title">Times Existentes</h2>
      <ul class="gc-list" *ngIf="teams.length > 0; else noTeams">
        <li *ngFor="let team of teams" class="gc-list-item team-list-item">
          <div class="team-info">
            <span class="team-name">{{ team.name }}</span>
            <span class="badge badge-orange">{{ team.tag }}</span>
            <span class="meta">{{ team.players.length || 0 }} membros</span>
          </div>
          <button class="btn btn-secondary btn-small" (click)="goToTeamDetailsById(team.id)">Ver</button>
        </li>
      </ul>
      <ng-template #noTeams>
        <p class="meta">Nenhum time cadastrado. Clique em <strong>+ Novo Time</strong> para começar.</p>
      </ng-template>
    </div>
  </div>
</div>

<app-create-team-modal
  *ngIf="showCreateModal"
  (closed)="closeCreateModal()"
  (created)="onTeamCreated($event)">
</app-create-team-modal>
