<div class="form-container auth-page">
  <div class="form-wrapper">
    <div class="auth-logo">
      <span class="auth-logo-icon">CS</span>
      <span class="auth-logo-text">LEAGUE</span>
    </div>
    <h2 class="form-header">Entrar</h2>
    <p class="form-subtitle">Acesse sua conta para competir</p>
    <form class="form-group-spacing" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-fields-group">
        <div class="form-group">
          <label for="email-address" class="sr-only">Endereço de Email</label>
          <input id="email-address" name="email" type="email" autocomplete="email" required
            formControlName="email"
            class="input-field form-field-top"
            placeholder="Endereço de Email">
          <div *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched" class="error-message">
            <div *ngIf="loginForm.get('email')?.errors?.['required']">Email é obrigatório.</div>
            <div *ngIf="loginForm.get('email')?.errors?.['email']">Email inválido.</div>
          </div>
        </div>
        <div class="form-group">
          <label for="password" class="sr-only">Senha</label>
          <div class="password-field-wrap">
            <input id="password" name="password" [type]="showPassword ? 'text' : 'password'" autocomplete="current-password" required
              formControlName="password"
              class="input-field form-field-bottom password-field-input"
              placeholder="Senha">
            <button
              type="button"
              class="password-toggle"
              (click)="togglePasswordVisibility()"
              [attr.aria-label]="showPassword ? 'Ocultar senha' : 'Mostrar senha'"
              [attr.aria-pressed]="showPassword">
              <svg *ngIf="!showPassword" class="password-toggle-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path fill="currentColor" d="M12 5C7 5 2.73 8.11 1 12.5c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5C21.27 8.11 17 5 12 5zm0 12.5a5 5 0 1 1 0-10 5 5 0 0 1 0 10zm0-2.5a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5z"/>
              </svg>
              <svg *ngIf="showPassword" class="password-toggle-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path fill="currentColor" d="M12 6.5c2.76 0 5.26 1.14 7.07 2.97l-1.41 1.41A7.94 7.94 0 0 0 12 8.5c-1.61 0-3.11.48-4.36 1.31L6.23 8.4C7.88 7.17 9.86 6.5 12 6.5zM3.27 3 2 4.27l2.04 2.04A11.8 11.8 0 0 0 1 12.5C2.73 16.89 7 20 12 20c2.09 0 4.04-.53 5.74-1.46L19.73 22 21 20.73 3.27 3zm7.53 7.53 1.41 1.41A2.5 2.5 0 0 1 12 14.5c-.69 0-1.31-.28-1.76-.73l1.56 1.56c.17.08.35.12.54.12 1.38 0 2.5-1.12 2.5-2.5 0-.19-.04-.37-.12-.54l1.41 1.41A4.98 4.98 0 0 0 12 16.5a5 5 0 0 1-1.2-5.47z"/>
              </svg>
            </button>
          </div>
          <div *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" class="error-message">
            <div *ngIf="loginForm.get('password')?.errors?.['required']">Senha é obrigatória.</div>
            <div *ngIf="loginForm.get('password')?.errors?.['minlength']">A senha deve ter pelo menos 6 caracteres.</div>
          </div>
        </div>
      </div>

      <div class="form-group">
        <button type="submit" class="btn btn-primary" [disabled]="loading">
          {{ loading ? 'Entrando...' : 'Entrar' }}
        </button>
      </div>
      <div *ngIf="loginError" class="error-message text-center mt-2">
        {{ loginError }}
      </div>
    </form>

    <div class="text-center mt-4">
      <p class="text-small text-gray-600">Ou</p>
      <button (click)="loginWithSteam()" class="btn btn-steam mt-4" type="button">
        <img src="https://upload.wikimedia.org/wikipedia/commons/8/83/Steam_icon_logo.svg" alt="Steam Logo">
        Entrar com Steam
      </button>
    </div>

    <div class="text-center text-small mt-4">
      <a routerLink="/register" class="text-link">
        Não tem uma conta? Cadastre-se
      </a>
    </div>
  </div>
</div>
