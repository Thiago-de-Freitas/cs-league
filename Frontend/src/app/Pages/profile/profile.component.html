<div class="page-container">
  <div class="page-inner max-width-narrow">
    <h1 class="page-title">Meu <span style="color: var(--gc-orange)">Perfil</span></h1>

    <div class="profile-card gc-card">
      <div class="profile-header">
        <div class="profile-avatar">{{ userName.charAt(0).toUpperCase() }}</div>
        <div class="profile-info">
          <div class="profile-name">{{ userName }}</div>
          <div class="profile-email">{{ email }}</div>
          <span class="badge badge-orange">{{ role }}</span>
        </div>
      </div>

      <div *ngIf="successMsg" class="success-message">{{ successMsg }}</div>
      <div *ngIf="errorMsg" class="error-message mb-4">{{ errorMsg }}</div>

      <h2 class="section-title">Editar Perfil</h2>
      <form [formGroup]="profileForm" (ngSubmit)="onUpdateProfile()" class="form-group-spacing">
        <div class="form-group">
          <label for="displayName" class="form-label">Nome de Exibição</label>
          <input type="text" id="displayName" formControlName="displayName" class="input-field">
        </div>
        <div class="form-group">
          <label for="steamId" class="form-label">Steam ID</label>
          <input type="text" id="steamId" formControlName="steamId" class="input-field" placeholder="76561198...">
        </div>
        <button type="button" class="btn btn-ghost w-full mb-4" (click)="connectSteam()">
          Conectar Steam (em breve)
        </button>
        <button type="submit" class="btn btn-primary w-full">Salvar Alterações</button>
      </form>
    </div>
  </div>
</div>
