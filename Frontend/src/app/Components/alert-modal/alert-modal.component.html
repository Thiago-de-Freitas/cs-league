<div class="gc-modal-backdrop" (click)="onBackdropClick($event)" role="alertdialog" aria-modal="true" [attr.aria-labelledby]="titleId">
  <div class="gc-modal alert-modal" [class]="'alert-modal--' + type">
    <div class="alert-modal-header">
      <div class="alert-modal-heading">
        <div class="alert-modal-icon" aria-hidden="true">
          <svg *ngIf="type === 'error'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/><path d="M15 9l-6 6M9 9l6 6"/>
          </svg>
          <svg *ngIf="type === 'warning'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 9v4m0 4h.01M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
          </svg>
          <svg *ngIf="type === 'success'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 6L9 17l-5-5"/>
          </svg>
          <svg *ngIf="type === 'info'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/>
          </svg>
        </div>
        <h2 [id]="titleId" class="gc-modal-title">{{ title }}</h2>
      </div>
      <button type="button" class="gc-modal-close" (click)="close()" aria-label="Fechar">&times;</button>
    </div>

    <div class="alert-modal-body">
      <p class="alert-message">{{ message }}</p>
      <div *ngIf="highlight" class="alert-highlight">{{ highlight }}</div>
      <p *ngIf="hint" class="alert-hint">{{ hint }}</p>
    </div>

    <div class="alert-modal-footer">
      <button type="button" class="btn btn-primary" (click)="close()">{{ buttonLabel }}</button>
    </div>
  </div>
</div>
