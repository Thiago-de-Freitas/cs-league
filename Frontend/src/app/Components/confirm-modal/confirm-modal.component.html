<div class="gc-modal-backdrop" (click)="onBackdropClick($event)" role="dialog" aria-modal="true" [attr.aria-labelledby]="titleId">
  <div class="gc-modal confirm-modal" [class.confirm-modal--danger]="danger">
    <div class="confirm-modal-header">
      <div class="confirm-modal-heading">
        <div *ngIf="danger" class="confirm-modal-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 9v4m0 4h.01M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
          </svg>
        </div>
        <div>
          <h2 [id]="titleId" class="gc-modal-title">{{ title }}</h2>
          <p *ngIf="subtitle" class="confirm-modal-subtitle">{{ subtitle }}</p>
        </div>
      </div>
      <button type="button" class="gc-modal-close" (click)="cancel()" [disabled]="loading" aria-label="Fechar">&times;</button>
    </div>

    <div class="confirm-modal-body">
      <p class="confirm-message">{{ message }}</p>
      <div *ngIf="highlight" class="confirm-highlight">
        <span *ngIf="highlightLabel" class="confirm-highlight-label">{{ highlightLabel }}</span>
        <span class="confirm-highlight-value">{{ highlight }}</span>
      </div>
      <p *ngIf="hint" class="confirm-hint">{{ hint }}</p>
    </div>

    <div class="confirm-modal-footer">
      <button type="button" class="btn btn-ghost" (click)="cancel()" [disabled]="loading">{{ cancelLabel }}</button>
      <button
        type="button"
        class="btn"
        [class.btn-danger]="danger"
        [class.btn-primary]="!danger"
        (click)="confirm()"
        [disabled]="loading">
        {{ loading ? 'Aguarde...' : confirmLabel }}
      </button>
    </div>
  </div>
</div>
