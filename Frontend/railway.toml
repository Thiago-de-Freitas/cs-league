# Serviço frontend — cs-league-front
#
# OBRIGATÓRIO: Settings → Root Directory = Frontend
#
# Variáveis: Frontend/railway.env (não coloque no railway.toml)
#   railway variable import --file railway.env --service cs-league-front --yes
# Ou: ..\scripts\railway-import-vars.ps1 -Target front

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 120
startCommand = "node serve.prod.cjs"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
